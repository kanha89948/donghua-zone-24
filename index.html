<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donghua Zone 24</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-size:28px;
font-weight:700;
color:#ff2d2d;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:.3s;
}

nav a:hover{
color:gold;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.8)),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:55px;
color:gold;
}

.hero p{
margin:20px 0;
font-size:20px;
max-width:700px;
}

.btn{
display:inline-block;
padding:14px 35px;
background:#ff2d2d;
color:white;
text-decoration:none;
border-radius:40px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:gold;
color:black;
}
</style>

</head>
<body>

<header>
<div class="logo">🐉 Donghua Zone 24</div>

<nav>
<a href="#">Home</a>
<a href="#">Series</a>
<a href="#">Updates</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">

<h1>Welcome To Donghua Zone 24</h1>

<p>
Latest Chinese Donghua Updates, Episode Guides, Trailers,
News & Original Content.
</p>

<a class="btn" href="https://youtube.com/@donghuazone24-x?si=aGmlblVFv2XrDwum">
Subscribe YouTube
</a>

</section>

</body>
</html>
